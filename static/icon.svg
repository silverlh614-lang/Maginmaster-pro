  <path d="M80 32 l-9 1 l4 8 z" fill="#2ee58a"/>
  <!-- bitcoin mark -->
  <text x="50" y="70" font-size="58" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', 'Noto Sans', sans-serif"
        font-weight="800" fill="#f7931a">₿</text>
