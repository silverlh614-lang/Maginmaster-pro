<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1114"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="98" height="98" rx="21" fill="none" stroke="#2a323c" stroke-width="2"/>
  <!-- upward breakout trend -->
  <polyline points="20,72 40,56 54,63 80,32" fill="none" stroke="#2ee58a"
